<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat n Date - Dreams of Love</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://unpkg.com/@supabase/supabase-js"></script>
  <script defer src="scripts.js"></script>
</head>
<body>
  <header class="hero">
    <div class="overlay">
      <h1>Chat n Date 🇿🇦</h1>
      <p>Dreams of Love Start Here</p>
      <div class="auth-buttons">
        <button onclick="showLogin()">Login</button>
        <button onclick="showSignup()">Sign Up</button>
      </div>
    </div>
  </header>

  <!-- Auth Modal -->
  <div id="authModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="hideModal()">&times;</span>
      <h2 id="authTitle">Sign Up</h2>
      <form id="authForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit" id="authButton">Submit</button>
      </form>
      <p id="authMessage"></p>
    </div>
  </div>

  <!-- Features -->
  <section class="features">
    <h2>Why Join?</h2>
    <ul>
      <li>💬 Real-time Chat</li>
      <li>📸 Upload Photos</li>
      <li>❤️ Matchmaking System</li>
    </ul>
  </section>

  <!-- Profile Upload Section -->
  <section id="profileSection" class="profile hidden">
    <h2>Your Profile</h2>
    <form id="profileForm">
      <input type="text" id="displayName" placeholder="Your Name" required />
      <input type="file" id="avatarUpload" accept="image/*" required />
      <button type="submit">Upload Profile</button>
    </form>
    <div id="profilePreview" class="profile-preview hidden">
      <p>Profile Preview:</p>
      <img id="avatarPreview" src="" alt="Avatar Preview" />
      <p id="namePreview"></p>
    </div>
  </section>

  <!-- Matchmaking Section -->
  <section id="matchSection" class="match hidden">
    <h2>Find a Match</h2>
    <div id="matchContainer"></div>
    <div class="match-actions">
      <button onclick="passProfile()">❌ Pass</button>
      <button onclick="likeProfile()">❤️ Like</button>
    </div>
  </section>

  <!-- Chat Section -->
  <section id="chatSection" class="chat hidden">
    <h2>Live Chat</h2>
    <select id="matchedUsersSelect"></select>
    <div id="chatBox" class="chat-box"></div>
    <form id="chatForm">
      <input type="text" id="chatInput" placeholder="Type your message..." required />
      <button type="submit">Send</button>
    </form>
  </section>

  <footer class="footer">
    <p>&copy; 2025 Chat n Date - All rights reserved</p>
  </footer>
</body>
</html>
